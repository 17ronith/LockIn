<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LockIn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="shell">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>

      <header class="hd">
        <span class="brand">LockIn</span>
        <div id="userChip" class="user-chip hidden">
          <img id="userAvatar" class="user-avatar" src="" alt="" />
          <span id="userName" class="user-name"></span>
          <span id="userCredits" class="user-credits"></span>
        </div>
        <div id="guestBadge" class="guest-badge hidden">Not signed in</div>
      </header>

      <div id="videoCard" class="video-card hidden">
        <img id="videoThumb" class="video-thumb" src="" alt="" />
        <div class="video-meta">
          <div id="videoTitle" class="video-title"></div>
          <div class="video-tag">YouTube Video</div>
        </div>
      </div>

      <!-- URL paste input (always shown for logged-in users) -->
      <div id="urlSection" class="url-section hidden">
        <div class="url-label">
          <span class="url-label-icon">⌁</span>
          Paste any YouTube link
        </div>
        <div class="url-input-wrap" id="urlInputWrap">
          <input
            type="text"
            id="urlInput"
            class="url-input"
            placeholder="youtube.com/watch?v=…"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="urlGoBtn" class="url-go-btn" disabled>→</button>
        </div>
        <div id="urlPreview" class="url-preview hidden">
          <img id="urlThumb" class="url-thumb" src="" alt="" />
          <div class="url-preview-meta">
            <div id="urlPreviewTitle" class="url-preview-title">YouTube Video</div>
            <div class="url-preview-tag">Ready to LockIn</div>
          </div>
        </div>
      </div>

      <div class="sep"></div>

      <div id="creditInfo" class="credit-info hidden">
        <span class="ci-item"><span class="ci-dot dot-blue"></span>Video session — 2 credits</span>
        <span class="ci-item"><span class="ci-dot dot-teal"></span>Playlist rank — 8 credits</span>
      </div>

      <button id="lockInBtn" class="cta" disabled>
        <span id="ctaLabel">Let's LockIn →</span>
        <span id="ctaSpinner" class="spinner hidden"></span>
      </button>

      <button id="signInBtn" class="cta-secondary hidden">
        Sign in to LockIn →
      </button>

      <div id="statusMsg" class="status"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
